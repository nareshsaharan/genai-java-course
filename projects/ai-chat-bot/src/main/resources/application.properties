# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── OpenAI ────────────────────────────────────────────────────────────────────
# Set your key here OR export OPENAI_API_KEY=sk-... in the terminal.
# Leave blank to run in mock mode automatically.
openai.api-key=${OPENAI_API_KEY:}

# Model used by the Responses API.  gpt-4o-mini is cheapest and fast.
openai.model=gpt-4o-mini

# ── Mock mode ─────────────────────────────────────────────────────────────────
# true  → no real API calls; streams a fake reply (great for demos / CI)
# false → uses real OpenAI (requires a valid api-key above)
app.mock-mode=false

# ── CostGuard ─────────────────────────────────────────────────────────────────
# Maximum number of characters allowed in a single user message.
# Keeps students from accidentally sending huge prompts.
app.cost-guard.max-input-chars=500

# ── Local cache ───────────────────────────────────────────────────────────────
# Simple HashMap cache – stores answers in memory for the lifetime of the app.

# ── Multipart file upload ─────────────────────────────────────────────────────
# Allow audio files up to 10 MB for speech-to-text transcription.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
