# ── RAG chunking settings ──
# chunkSize: how many characters go into each chunk.
# overlap: how many characters from the end of one chunk are repeated
#          at the start of the next chunk (see README for why this matters).
rag.chunk.size=500
rag.chunk.overlap=100

# ── RAG answer safety settings ──
# min-score: the lowest cosine similarity score a retrieved chunk must
# have before we trust it enough to let the LLM use it. If even the
# best-matching chunk scores below this, we skip the LLM and return
# "I don't know from the provided documents." instead of risking a
# made-up answer built from irrelevant context.
rag.min-score=0.25
