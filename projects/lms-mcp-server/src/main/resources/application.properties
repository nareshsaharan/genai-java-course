# Spring Boot Application Properties
spring.application.name=lms-mcp-server

# STDIO transport requires stdout to carry ONLY JSON-RPC messages.
# The banner and any console logging would corrupt the protocol stream,
# so the banner is disabled and logging is routed to stderr/file only
# (see logback-spring.xml).
spring.main.banner-mode=off

# Logging Configuration
# Must be an ABSOLUTE path: Claude Desktop launches this jar with an
# arbitrary/unwritable working directory (observed to be "/"), so a
# relative path like "logs/..." fails to create its parent directory
# and crashes Spring Boot's logging init before the app even starts.
logging.level.root=INFO
logging.level.com.example.lmsmcp=DEBUG
logging.file.name=${user.home}/.lms-mcp-server/logs/lms-mcp-server.log
logging.file.max-size=10MB
logging.file.max-history=10

# MCP Server Configuration
mcp.server.name=lms-mcp-server
mcp.server.version=1.0.0

# Disable unnecessary auto-configurations for a lightweight MCP server
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.web.servlet.ServletWebServerFactoryAutoConfiguration
