# Activated via --spring.profiles.active=docker (set as SPRING_PROFILES_ACTIVE
# in docker-compose.yml). Layers production-appropriate hardening on top of
# application.yml rather than duplicating it: connection pool sizing, quieter
# logging, and a stricter Actuator exposure — application.yml's "always" show
# -details is a deliberate course-project choice documented there; a
# real deployment shouldn't return full DB health details to anonymous
# callers, so this profile tightens it back to Spring's own safer default.
management:
  endpoint:
    health:
      show-details: when-authorized

spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}

logging:
  level:
    root: WARN
    com.studybuddy: INFO
